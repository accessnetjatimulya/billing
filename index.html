<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>ACCESSNET BILLING</title>

  <style>

    body{
      margin:0;
      padding:0;
      background:#f5f5f5;
      font-family:Arial;
    }

    .box{
      width:90%;
      max-width:400px;
      margin:50px auto;
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
      text-align:center;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:10px;
      border:1px solid #ccc;
      border-radius:5px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      background:#0d6efd;
      border:none;
      color:white;
      border-radius:5px;
      font-weight:bold;
      cursor:pointer;
    }

  </style>
</head>
<body>

<div class="box">

  <h2>LOGIN PELANGGAN</h2>

  <input
    type="text"
    id="id"
    placeholder="ID Pelanggan"
  >

  <input
    type="text"
    id="hp"
    placeholder="Nomor HP"
  >

  <button onclick="login()">
    LOGIN
  </button>

</div>

<script>

const API =
'https://script.google.com/macros/s/AKfycbyQKu3cCxYa7WPpqlWI36jGkQTwn_-B7AHjOVa-1JJmeA6Ai0peOl3FwycOC2XIPrCj/exec';

async function login(){

  const login =
    document.getElementById('login')
    .value;

  const url =
    `${API}?action=loginPelanggan&login=${login}`;

  try{

    const response =
      await fetch(url);

    const res =
      await response.json();

    if(res.status){

      localStorage.setItem(
        'pelanggan',
        JSON.stringify(res.data)
      );

      window.location =
        'pelanggan.html';

    }else{

      alert(res.message);
    }

  }catch(err){

    alert(
      'Gagal koneksi server'
    );
  }
}
</script>

</body>
</html>
