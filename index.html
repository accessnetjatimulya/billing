<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- BOOTSTRAP -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- TOM SELECT -->
  <link
    href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css"
    rel="stylesheet"
  >

  <style>
    body{
      margin:0;
      background:#f4f7f6;
      font-family:Arial,sans-serif;
    }

    /* TOPBAR */
    .mobile-topbar{
      display:none;
      background:#111827;
      color:#fff;
      padding:12px 16px;
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:2000;
      align-items:center;
      justify-content:space-between;
    }

    /* SIDEBAR */
    .sidebar{
      position:fixed;
      top:0;
      left:0;
      width:250px;
      height:100vh;
      background:#1f2937;
      padding:20px;
      overflow-y:auto;
      z-index:1999;
      transition:all .3s ease;
    }

    .sidebar h4{
      color:#fff;
    }

    .btn-sidebar{
      width:100%;
      text-align:left;
      border:none;
      color:#d1d5db;
      margin-bottom:8px;
      border-radius:10px;
      padding:12px;
      transition:.2s;
    }

    .btn-sidebar:hover{
      background:#374151;
      color:#fff;
    }

    .btn-sidebar.active{
      background:#2563eb !important;
      color:#fff !important;
      font-weight:bold;
    }

    /* MAIN */
    .main-content{
      margin-left:250px;
      padding:20px;
      transition:.3s;
    }

    /* PAGE */
    .page{
      display:none;
    }

    .active-page{
      display:block;
    }

    .card{
      border:none;
      border-radius:18px;
      box-shadow:0 4px 12px rgba(0,0,0,.08);
    }

    /* RESPONSIVE */
    @media(max-width:991px){

      .mobile-topbar{
        display:flex;
      }

      .sidebar{
        top:58px;
        transform:translateX(-100%);
        width:280px;
        height:calc(100vh - 58px);
      }

      .sidebar.show{
        transform:translateX(0);
      }

      .main-content{
        margin-left:0;
        padding-top:80px;
      }
    }

    /* TABLE */
    .table thead th{
      white-space:nowrap;
      font-size:14px;
    }

    .table td{
      vertical-align:middle;
      font-size:14px;
    }

    /* INPUT */
    .form-control,
    .form-select{
      border-radius:12px;
      min-height:45px;
    }

    textarea.form-control{
      min-height:80px;
      resize:none;
    }

    /* BUTTON */
    .btn{
      border-radius:12px;
    }

    /* PDF */
    .pdf-scroll-container{
      overflow-x:auto;
      background:#f3f4f6;
      padding:15px;
    }

    #invoicePdfArea{
      width:794px;
      min-height:1123px;
      background:#fff;
      margin:auto;
      padding:40px;
      box-sizing:border-box;
    }

    @media(max-width:820px){
      #invoicePdfArea{
        transform:scale(.8);
        transform-origin:top center;
        margin-bottom:-180px;
      }
    }

    @media(max-width:620px){
      #invoicePdfArea{
        transform:scale(.6);
        margin-bottom:-420px;
      }
    }

    @media(max-width:450px){
      #invoicePdfArea{
        transform:scale(.45);
        margin-bottom:-650px;
      }
    }
  </style>
</head>

<body>

<!-- MOBILE TOPBAR -->
<div class="mobile-topbar">
  <strong>ACCESSNET</strong>

  <button
    class="btn btn-outline-light btn-sm"
    onclick="toggleSidebar()"
  >
    ☰
  </button>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebarMenu">

  <h4 class="text-center mb-4 d-none d-lg-block">
    ACCESSNET
  </h4>

  <button
    class="btn btn-sidebar active"
    id="btn-dashboard"
    onclick="showPage('dashboard')"
  >
    📊 Dashboard
  </button>

  <button
    class="btn btn-sidebar"
    id="btn-pelanggan"
    onclick="showPage('pelangganPage')"
  >
    👤 Data Pelanggan
  </button>

  <button
    class="btn btn-sidebar"
    id="btn-invoice"
    onclick="showPage('invoicePage')"
  >
    🧾 Buat Invoice
  </button>

  <button
    class="btn btn-sidebar"
    id="btn-data-invoice"
    onclick="showPage('dataInvoicePage')"
  >
    📁 Data Invoice
  </button>

</div>

<!-- MAIN -->
<div class="main-content">

  <!-- DASHBOARD -->
  <div id="dashboard" class="page active-page">

    <div class="card p-4 text-center">

      <h2 class="fw-bold">
        Selamat Datang di ACCESSNET
      </h2>

      <p class="text-muted">
        Sistem Manajemen Pelanggan & Invoice
      </p>

      <div class="row mt-4">

        <div class="col-md-4 mb-3">
          <div
            class="card bg-primary text-white p-4"
            style="cursor:pointer"
            onclick="showPage('pelangganPage')"
          >
            <h5 class="mb-0">
              Kelola Pelanggan
            </h5>
          </div>
        </div>

        <div class="col-md-4 mb-3">
          <div
            class="card bg-success text-white p-4"
            style="cursor:pointer"
            onclick="showPage('invoicePage')"
          >
            <h5 class="mb-0">
              Buat Invoice
            </h5>
          </div>
        </div>

        <div class="col-md-4 mb-3">
          <div
            class="card bg-dark text-white p-4"
            style="cursor:pointer"
            onclick="showPage('dataInvoicePage')"
          >
            <h5 class="mb-0">
              Data Invoice
            </h5>
          </div>
        </div>

      </div>
    </div>

  </div>

</div>

<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- TOM SELECT -->
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<!-- HTML2PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

/* TOGGLE SIDEBAR */
function toggleSidebar(){
  document.getElementById('sidebarMenu').classList.toggle('show');
}

/* SHOW PAGE */
function showPage(pageId){

  if(window.innerWidth < 992){
    document.getElementById('sidebarMenu').classList.remove('show');
  }

  document.querySelectorAll('.page').forEach(function(page){
    page.classList.remove('active-page');
  });

  document.getElementById(pageId).classList.add('active-page');

  document.querySelectorAll('.btn-sidebar').forEach(function(btn){
    btn.classList.remove('active');
  });

  if(pageId == 'dashboard'){
    document.getElementById('btn-dashboard').classList.add('active');
  }

  if(pageId == 'pelangganPage'){
    document.getElementById('btn-pelanggan').classList.add('active');
  }

  if(pageId == 'invoicePage'){
    document.getElementById('btn-invoice').classList.add('active');
  }

  if(pageId == 'dataInvoicePage'){
    document.getElementById('btn-data-invoice').classList.add('active');
  }
}

</script>
<!-- GANTI SEMUA google.script.run MENJADI FETCH API -->

<script>

/* =========================
   URL WEB APP APPS SCRIPT
========================= */
const API_URL =
'https://script.google.com/macros/s/AKfycbxW9ZUifJyVqB8gYLWe_TrbZqIIYjGTNM2Y24gGc105cDpEiEYOaxtMUUzQHTy5oRGWbA/exec';

/* =========================
   LOAD DATA PELANGGAN
========================= */
async function loadDataPelanggan(){

  try{

    const response =
      await fetch(API_URL + '?action=getPelanggan');

    const data =
      await response.json();

    allPelanggan = data;

    renderTable(data);
    updateDataList(data);
    updateTotalPelanggan(data);

  }catch(err){

    console.log(err);
    alert('Gagal mengambil data pelanggan');

  }
}

/* =========================
   SIMPAN DATA PELANGGAN
========================= */
async function simpanData(){

  if(cekIdPelanggan()){
    alert('ID sudah digunakan');
    return;
  }

  const formData = {

    action:'savePelanggan',

    ID:
      document.getElementById('f_id').value,

    NAMA:
      document.getElementById('f_nama').value,

    ALAMAT:
      document.getElementById('f_alamat').value,

    NO_HP:
      document.getElementById('f_kode_negara').value +
      document.getElementById('f_hp').value,

    PAKET:
      document.getElementById('f_paket').value,

    HARGA_PAKET:
      document.getElementById('f_harga').value,

    TIPE_LANGGANAN:
      document.getElementById('f_tipe').value
  };

  try{

    const response = await fetch(API_URL,{

      method:'POST',

      body:JSON.stringify(formData)

    });

    const result =
      await response.text();

    alert(result);

    bootstrap.Modal
      .getInstance(
        document.getElementById('modalPelanggan')
      )
      .hide();

    loadDataPelanggan();

  }catch(err){

    console.log(err);
    alert('Gagal menyimpan data');

  }
}

/* =========================
   HAPUS PELANGGAN
========================= */
async function hapusPelanggan(id){

  if(!confirm('Hapus pelanggan?')) return;

  try{

    const response =
      await fetch(
        API_URL +
        '?action=deletePelanggan&id=' +
        encodeURIComponent(id)
      );

    const result =
      await response.text();

    alert(result);

    loadDataPelanggan();

  }catch(err){

    console.log(err);
    alert('Gagal menghapus');

  }
}

/* =========================
   LOAD DATA INVOICE
========================= */
async function loadDataInvoice(){

  const tbody =
    document.getElementById(
      'tabelInvoiceBody'
    );

  tbody.innerHTML =
    '<tr><td colspan="9" class="text-center">Memuat data...</td></tr>';

  try{

    const response =
      await fetch(API_URL + '?action=getInvoice');

    const data =
      await response.json();

    if(!data || data.length === 0){

      tbody.innerHTML =
        '<tr><td colspan="9" class="text-center">Tidak ada data</td></tr>';

      return;
    }

    let html = '';

    data.forEach(function(inv){

      html += `
        <tr>
          <td>${inv.NO_INVOICE}</td>
          <td>${inv.TANGGAL}</td>
          <td>${inv.ID}</td>
          <td>${inv.NAMA}</td>
          <td>${inv.PERIODE}</td>
          <td>${inv.PAKET}</td>
          <td>Rp ${Number(inv.TAGIHAN).toLocaleString('id-ID')}</td>

          <td>
            ${
              inv.PDF
              ?
              `<a href="${inv.PDF}" target="_blank"
               class="btn btn-success btn-sm">
               PDF
               </a>`
              :
              '-'
            }
          </td>

          <td>
            <button
              class="btn btn-dark btn-sm"
              onclick="hapusInvoice('${inv.NO_INVOICE}')"
            >
              Hapus
            </button>
          </td>
        </tr>
      `;
    });

    tbody.innerHTML = html;

  }catch(err){

    console.log(err);

    tbody.innerHTML =
      '<tr><td colspan="9" class="text-danger text-center">Gagal load data</td></tr>';

  }
}

/* =========================
   HAPUS INVOICE
========================= */
async function hapusInvoice(noInvoice){

  if(!confirm('Hapus invoice ini?')) return;

  try{

    const response =
      await fetch(
        API_URL +
        '?action=deleteInvoice&noInvoice=' +
        encodeURIComponent(noInvoice)
      );

    const result =
      await response.text();

    alert(result);

    loadDataInvoice();

  }catch(err){

    console.log(err);
    alert('Gagal hapus invoice');

  }
}

/* =========================
   SIMPAN INVOICE
========================= */
async function downloadInvoicePDF(){

  const element =
    document.getElementById(
      'invoicePdfArea'
    );

  const invoice =
    document.getElementById(
      'pdfInvoice'
    ).innerText;

  const opt = {

    margin:0,

    filename:
      invoice + '.pdf',

    image:{
      type:'jpeg',
      quality:1
    },

    html2canvas:{
      scale:2,
      useCORS:true
    },

    jsPDF:{
      unit:'px',
      format:[794,1123],
      orientation:'portrait'
    }
  };

  try{

    const pdfBlob =
      await html2pdf()
      .set(opt)
      .from(element)
      .outputPdf('blob');

    const reader =
      new FileReader();

    reader.readAsDataURL(pdfBlob);

    reader.onloadend = async function(){

      const base64 =
        reader.result.split(',')[1];

      const data = {

        action:'saveInvoice',

        noInvoice:
          document.getElementById('pdfInvoice').innerText,

        tanggal:
          document.getElementById('pdfTanggal').innerText,

        id:
          document.getElementById('pdfIdpel').innerText,

        nama:
          document.getElementById('pdfNama').innerText,

        periode:
          document.getElementById('pdfPeriode').innerText,

        paket:
          document.getElementById('pdfDeskripsi').innerText,

        tagihan:
          document.getElementById('pdfGrand').innerText,

        base64:base64
      };

      try{

        const response =
          await fetch(API_URL,{

            method:'POST',

            body:JSON.stringify(data)

          });

        const url =
          await response.text();

        alert('Invoice berhasil disimpan');

        loadDataInvoice();

        showPage('dataInvoicePage');

        html2pdf()
          .set(opt)
          .from(element)
          .save();

        window.open(url,'_blank');

      }catch(err){

        console.log(err);
        alert('Gagal simpan invoice');

      }
    };

  }catch(err){

    console.log(err);
    alert('Gagal generate PDF');

  }
}

</script>
</body>
</html>
