<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- BOOTSTRAP -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- TOM SELECT -->
  <link
    href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css"
    rel="stylesheet"
  >

  <style>
    body{
      margin:0;
      background:#f4f7f6;
      font-family:Arial,sans-serif;
    }

    /* TOPBAR */
    .mobile-topbar{
      display:none;
      background:#111827;
      color:#fff;
      padding:12px 16px;
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:2000;
      align-items:center;
      justify-content:space-between;
    }

    /* SIDEBAR */
    .sidebar{
      position:fixed;
      top:0;
      left:0;
      width:250px;
      height:100vh;
      background:#1f2937;
      padding:20px;
      overflow-y:auto;
      z-index:1999;
      transition:all .3s ease;
    }

    .sidebar h4{
      color:#fff;
    }

    .btn-sidebar{
      width:100%;
      text-align:left;
      border:none;
      color:#d1d5db;
      margin-bottom:8px;
      border-radius:10px;
      padding:12px;
      transition:.2s;
    }

    .btn-sidebar:hover{
      background:#374151;
      color:#fff;
    }

    .btn-sidebar.active{
      background:#2563eb !important;
      color:#fff !important;
      font-weight:bold;
    }

    /* MAIN */
    .main-content{
      margin-left:250px;
      padding:20px;
      transition:.3s;
    }

    /* PAGE */
    .page{
      display:none;
    }

    .active-page{
      display:block;
    }

    .card{
      border:none;
      border-radius:18px;
      box-shadow:0 4px 12px rgba(0,0,0,.08);
    }

    /* RESPONSIVE */
    @media(max-width:991px){

      .mobile-topbar{
        display:flex;
      }

      .sidebar{
        top:58px;
        transform:translateX(-100%);
        width:280px;
        height:calc(100vh - 58px);
      }

      .sidebar.show{
        transform:translateX(0);
      }

      .main-content{
        margin-left:0;
        padding-top:80px;
      }
    }

    /* TABLE */
    .table thead th{
      white-space:nowrap;
      font-size:14px;
    }

    .table td{
      vertical-align:middle;
      font-size:14px;
    }

    /* INPUT */
    .form-control,
    .form-select{
      border-radius:12px;
      min-height:45px;
    }

    textarea.form-control{
      min-height:80px;
      resize:none;
    }

    /* BUTTON */
    .btn{
      border-radius:12px;
    }

    /* PDF */
    .pdf-scroll-container{
      overflow-x:auto;
      background:#f3f4f6;
      padding:15px;
    }

    #invoicePdfArea{
      width:794px;
      min-height:1123px;
      background:#fff;
      margin:auto;
      padding:40px;
      box-sizing:border-box;
    }

    @media(max-width:820px){
      #invoicePdfArea{
        transform:scale(.8);
        transform-origin:top center;
        margin-bottom:-180px;
      }
    }

    @media(max-width:620px){
      #invoicePdfArea{
        transform:scale(.6);
        margin-bottom:-420px;
      }
    }

    @media(max-width:450px){
      #invoicePdfArea{
        transform:scale(.45);
        margin-bottom:-650px;
      }
    }
  </style>
</head>

<body>

<!-- MOBILE TOPBAR -->
<div class="mobile-topbar">
  <strong>ACCESSNET</strong>

  <button
    class="btn btn-outline-light btn-sm"
    onclick="toggleSidebar()"
  >
    ☰
  </button>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebarMenu">

  <h4 class="text-center mb-4 d-none d-lg-block">
    ACCESSNET
  </h4>

  <button
    class="btn btn-sidebar active"
    id="btn-dashboard"
    onclick="showPage('dashboard')"
  >
    📊 Dashboard
  </button>

  <button
    class="btn btn-sidebar"
    id="btn-pelanggan"
    onclick="showPage('pelangganPage')"
  >
    👤 Data Pelanggan
  </button>

  <button
    class="btn btn-sidebar"
    id="btn-invoice"
    onclick="showPage('invoicePage')"
  >
    🧾 Buat Invoice
  </button>

  <button
    class="btn btn-sidebar"
    id="btn-data-invoice"
    onclick="showPage('dataInvoicePage')"
  >
    📁 Data Invoice
  </button>

</div>

<!-- MAIN -->
<div class="main-content">

  <!-- DASHBOARD -->
  <div id="dashboard" class="page active-page">

    <div class="card p-4 text-center">

      <h2 class="fw-bold">
        Selamat Datang di ACCESSNET
      </h2>

      <p class="text-muted">
        Sistem Manajemen Pelanggan & Invoice
      </p>

      <div class="row mt-4">

        <div class="col-md-4 mb-3">
          <div
            class="card bg-primary text-white p-4"
            style="cursor:pointer"
            onclick="showPage('pelangganPage')"
          >
            <h5 class="mb-0">
              Kelola Pelanggan
            </h5>
          </div>
        </div>

        <div class="col-md-4 mb-3">
          <div
            class="card bg-success text-white p-4"
            style="cursor:pointer"
            onclick="showPage('invoicePage')"
          >
            <h5 class="mb-0">
              Buat Invoice
            </h5>
          </div>
        </div>

        <div class="col-md-4 mb-3">
          <div
            class="card bg-dark text-white p-4"
            style="cursor:pointer"
            onclick="showPage('dataInvoicePage')"
          >
            <h5 class="mb-0">
              Data Invoice
            </h5>
          </div>
        </div>

      </div>
    </div>

  </div>

</div>

<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- TOM SELECT -->
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<!-- HTML2PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

/* TOGGLE SIDEBAR */
function toggleSidebar(){
  document.getElementById('sidebarMenu').classList.toggle('show');
}

/* SHOW PAGE */
function showPage(pageId){

  if(window.innerWidth < 992){
    document.getElementById('sidebarMenu').classList.remove('show');
  }

  document.querySelectorAll('.page').forEach(function(page){
    page.classList.remove('active-page');
  });

  document.getElementById(pageId).classList.add('active-page');

  document.querySelectorAll('.btn-sidebar').forEach(function(btn){
    btn.classList.remove('active');
  });

  if(pageId == 'dashboard'){
    document.getElementById('btn-dashboard').classList.add('active');
  }

  if(pageId == 'pelangganPage'){
    document.getElementById('btn-pelanggan').classList.add('active');
  }

  if(pageId == 'invoicePage'){
    document.getElementById('btn-invoice').classList.add('active');
  }

  if(pageId == 'dataInvoicePage'){
    document.getElementById('btn-data-invoice').classList.add('active');
  }
}

</script>

</body>
</html>
