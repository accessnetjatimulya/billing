<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>ACCESSNET BILLING</title>

<link
  href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  overflow-x:hidden;
}

body{

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;

  overflow:hidden;

  font-family:'Poppins',sans-serif;

  background:
    radial-gradient(
      circle at top left,
      #173b8f 0%,
      #07152f 45%,
      #020817 100%
    );

  position:relative;
}

body::before{

  content:'';

  position:absolute;

  width:320px;
  height:320px;

  background:#00ffcc15;

  border-radius:50%;

  right:-120px;
  bottom:-120px;

  filter:blur(20px);
}

body::after{

  content:'';

  position:absolute;

  width:240px;
  height:240px;

  background:#2563eb20;

  border-radius:50%;

  top:-100px;
  left:-100px;

  filter:blur(20px);
}

.card{

  width:100%;
  max-width:370px;

  margin:20px;

  padding:35px 22px;

  border-radius:24px;

  background:
    linear-gradient(
      145deg,
      rgba(28,48,95,0.96),
      rgba(12,18,35,0.97)
    );

  border:
    1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(10px);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.35);

  position:relative;
  z-index:2;
}

.logo{

  width:180px;

  max-width:100%;

  display:block;

  margin:auto;
  margin-bottom:20px;

  object-fit:contain;
}

h1{

  color:white;

  text-align:center;

  font-size:24px;

  font-weight:700;

  margin-bottom:12px;
}

.desc{

  color:#c4cee1;

  text-align:center;

  font-size:14px;

  line-height:1.7;

  margin-bottom:28px;
}

.label{

  display:block;

  color:#d8e2ff;

  text-align:center;

  font-size:13px;

  font-weight:600;

  margin-bottom:12px;
}

input{

  width:100%;

  height:54px;

  border:none;

  outline:none;

  border-radius:14px;

  background:#0b1222;

  border:
    1px solid rgba(255,255,255,0.05);

  padding:0 16px;

  color:white;

  font-size:15px;

  margin-bottom:18px;
}

input::placeholder{
  color:#71809c;
}

button{

  width:100%;

  height:54px;

  border:none;

  border-radius:14px;

  background:
    linear-gradient(
      90deg,
      #2563eb,
      #1d4ed8
    );

  color:white;

  font-size:16px;

  font-weight:600;

  cursor:pointer;

  transition:0.3s;
}

button:hover{

  transform:translateY(-2px);

  opacity:0.95;
}

.loading{

  opacity:0.7;

  pointer-events:none;
}

@media(max-width:480px){

  .card{

    width:100%;

    margin:15px;

    padding:28px 18px;
  }

  h1{
    font-size:20px;
  }

  .desc{
    font-size:13px;
    line-height:1.6;
  }

  .logo{
    width:180px;
  }

  input,
  button{
    height:50px;
    font-size:14px;
  }
}

</style>
</head>
<body>

<div class="card">

  <img
    src="logo.png"
    alt="ACCESSNET"
    class="logo"
  >

  <h1>Pembayaran Tagihan</h1>

  <div class="desc">
    Masukkan ID Pelanggan atau
    Nomor HP untuk mengecek
    tagihan internet Anda.
  </div>

  <label class="label">
    ID PELANGGAN / NO. HP
  </label>

  <input
    type="text"
    id="login"
    placeholder="Contoh: 2400001 atau 081234567890"
  >

  <button
    id="btnLogin"
    onclick="login()"
  >
    Cek Tagihan
  </button>

</div>

<script>

const API =
'https://script.google.com/macros/s/AKfycbxcLx3gafaon08Bj4QScM5rNjBCtBxpjSGGbwJ_4yN4pZA-5JR7DTesoAlYALvkIbgn/exec';

async function login(){

  const btn =
    document.getElementById(
      'btnLogin'
    );

  const login =
    document.getElementById(
      'login'
    ).value.trim();

  if(login == ''){

    alert(
      'Masukkan ID pelanggan atau nomor HP'
    );

    return;
  }

  btn.innerHTML =
    'Memproses...';

  btn.classList.add(
    'loading'
  );

  try{

    const response =
      await fetch(
        `${API}?action=loginPelanggan&login=${login}`
      );

    const res =
      await response.json();

    if(res.status){

      localStorage.setItem(
        'pelanggan',
        JSON.stringify(res.data)
      );

      window.location =
        'pelanggan.html';

    }else{

      alert(
        'Data pelanggan tidak ditemukan'
      );
    }

  }catch(err){

    alert(
      'Gagal koneksi server'
    );
  }

  btn.innerHTML =
    'Cek Tagihan';

  btn.classList.remove(
    'loading'
  );
}

</script>

</body>
</html>
