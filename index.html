<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>ACCESSNET BILLING</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      font-family:'Poppins',sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:
        radial-gradient(
          circle at top left,
          #0f2f73 0%,
          #08152f 40%,
          #020817 100%
        );
      padding:20px;
      position:relative;
    }

    body::before{
      content:'';
      position:absolute;
      width:350px;
      height:350px;
      background:#00ffcc20;
      border-radius:50%;
      bottom:-150px;
      right:-120px;
      filter:blur(20px);
    }

    body::after{
      content:'';
      position:absolute;
      width:250px;
      height:250px;
      background:#1d4ed820;
      border-radius:50%;
      top:-120px;
      left:-120px;
      filter:blur(20px);
    }

    .card{

      width:100%;
      max-width:360px;

      background:
        linear-gradient(
          145deg,
          rgba(28,48,95,0.95),
          rgba(13,20,40,0.95)
        );

      border:1px solid rgba(255,255,255,0.08);

      border-radius:22px;

      padding:35px 25px;

      backdrop-filter:blur(10px);

      box-shadow:
        0 10px 40px rgba(0,0,0,0.35);

      position:relative;
      z-index:2;
    }

    .icon-box{

      width:85px;
      height:85px;

      margin:auto;
      margin-bottom:22px;

      border-radius:22px;

      display:flex;
      align-items:center;
      justify-content:center;

      background:
        linear-gradient(
          145deg,
          #294d93,
          #1c3260
        );
    }

    .icon-box svg{
      width:42px;
      height:42px;
      color:white;
    }
	
	.logo{
	  width:55px;
	  height:55px;
	  object-fit:contain;
	}

    h1{
      color:white;
      text-align:center;
      font-size:30px;
      font-weight:700;
      margin-bottom:10px;
    }

    .desc{
      color:#bfc9dd;
      text-align:center;
      font-size:15px;
      line-height:1.6;
      margin-bottom:28px;
    }

    .label{
      color:#d8e2ff;
      font-size:13px;
      font-weight:600;
      margin-bottom:10px;
      display:block;
    }

    input{

      width:100%;

      height:52px;

      border:none;

      outline:none;

      border-radius:12px;

      background:#0d1527;

      padding:0 16px;

      color:white;

      font-size:15px;

      margin-bottom:18px;

      border:1px solid rgba(255,255,255,0.05);
    }

    input::placeholder{
      color:#6f7c98;
    }

    button{

      width:100%;

      height:52px;

      border:none;

      border-radius:12px;

      background:
        linear-gradient(
          90deg,
          #2563eb,
          #1d4ed8
        );

      color:white;

      font-size:16px;

      font-weight:600;

      cursor:pointer;

      transition:0.3s;
    }

    button:hover{
      transform:translateY(-2px);
      opacity:0.95;
    }

    .loading{
      opacity:0.7;
      pointer-events:none;
    }

    @media(max-width:480px){

      .card{
        padding:30px 20px;
      }

      h1{
        font-size:26px;
      }

      .desc{
        font-size:14px;
      }

    }

  </style>
</head>
<body>

<div class="card">

<div class="icon-box">

  <img
    src="logo.png"
    alt="ACCESSNET"
    class="logo"
  >

</div>

  </div>

  <h1>Pembayaran Tagihan</h1>

  <div class="desc">
    Masukkan ID Pelanggan atau
    Nomor HP untuk mengecek
    tagihan Anda.
  </div>

  <label class="label center">
    ID PELANGGAN / NO. HP
  </label>

  <input
    type="text"
    id="login"
    placeholder="Contoh: 2400001 atau 081234567890"
  />

  <button id="btnLogin" onclick="login()">
    Cek Tagihan
  </button>

</div>

<script>

const API =
'https://script.google.com/macros/s/AKfycbyQKu3cCxYa7WPpqlWI36jGkQTwn_-B7AHjOVa-1JJmeA6Ai0peOl3FwycOC2XIPrCj/exec';

async function login(){

  const btn =
    document.getElementById('btnLogin');

  const login =
    document.getElementById('login')
    .value
    .trim();

  if(login == ''){

    alert(
      'Masukkan ID pelanggan atau nomor HP'
    );

    return;
  }

  btn.innerHTML = 'Memproses...';

  btn.classList.add('loading');

  const url =
    `${API}?action=loginPelanggan&login=${login}`;

  try{

    const response =
      await fetch(url);

    const res =
      await response.json();

    if(res.status){

      localStorage.setItem(
        'pelanggan',
        JSON.stringify(res.data)
      );

      window.location =
        'pelanggan.html';

    }else{

      alert(
        'Data pelanggan tidak ditemukan'
      );
    }

  }catch(err){

    alert(
      'Gagal koneksi server'
    );
  }

  btn.innerHTML = 'Cek Tagihan';

  btn.classList.remove('loading');
}

</script>

</body>
</html>
