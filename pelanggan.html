<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Status Tagihan</title>

<link
  href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  overflow-x:hidden;
}

body{

  min-height:100vh;

  padding:20px;

  font-family:'Poppins',sans-serif;

  background:
    radial-gradient(
      circle at top left,
      #173b8f 0%,
      #07152f 45%,
      #020817 100%
    );

  color:white;
}

.container{

  width:100%;
  max-width:420px;

  margin:auto;
}

.logo{

  width:120px;

  display:block;

  margin:auto;
  margin-bottom:20px;
}

.card{

  background:
    linear-gradient(
      145deg,
      rgba(28,48,95,0.96),
      rgba(12,18,35,0.97)
    );

  border:
    1px solid rgba(255,255,255,0.08);

  border-radius:22px;

  padding:22px;

  margin-bottom:18px;

  backdrop-filter:blur(10px);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.35);
}

.title{

  font-size:14px;

  color:#9fb1d1;

  margin-bottom:6px;
}

.value{

  font-size:18px;

  font-weight:600;

  color:white;
}

.alamat{

  margin-top:8px;

  font-size:14px;

  color:#b8c4da;

  line-height:1.6;
}

.tagihan{

  padding:22px 20px;
}

.info-row{

  display:flex;

  justify-content:space-between;

  gap:20px;
}

.info-col{

  flex:1;
}

.right{

  text-align:right;
}

.nominal{

  font-size:28px;

  font-weight:700;

  color:#00ffcc;
}

.bill-row{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:15px;

  margin-top:14px;
}

.status{

  display:inline-block;

  padding:10px 18px;

  border-radius:50px;

  font-size:14px;

  font-weight:600;
}

.belum{

  background:#ff980020;

  color:#ffb74d;
}

.lunas{

  background:#00c85320;

  color:#69f0ae;
}

.payment-info{

  margin-top:18px;

  font-size:13px;

  line-height:1.6;

  color:#b8c4da;
}

.confirm-btn{

  width:100%;

  height:48px;

  border:none;

  border-radius:14px;

  margin-bottom:18px;

  background:
    linear-gradient(
      90deg,
      #00c853,
      #00a844
    );

  color:white;

  font-size:14px;

  font-weight:600;

  cursor:pointer;
}

.button{

  width:100%;

  height:54px;

  border:none;

  border-radius:14px;

  background:
    linear-gradient(
      90deg,
      #2563eb,
      #1d4ed8
    );

  color:white;

  font-size:15px;

  font-weight:600;

  cursor:pointer;
}

@media(max-width:480px){

  .nominal{
    font-size:32px;
  }

  .value{
    font-size:16px;
  }
}

</style>
</head>
<body>

<div class="container">

  <button
    class="confirm-btn"
  >
    Konfirmasi Pembayaran
  </button>

  <img
    src="logo.png"
    class="logo"
    alt="ACCESSNET"
  >

  <div class="card">

    <div class="title">
      Nama Pelanggan
    </div>

    <div
      class="value"
      id="nama"
    >
      -
    </div>

    <div
      class="alamat"
      id="alamat"
    >
      -
    </div>

  </div>

  <div class="card info-row">

    <div class="info-col">

      <div class="title">
        Paket Internet
      </div>

      <div
        class="value"
        id="paket"
      >
        -
      </div>

    </div>

    <div class="info-col right">

      <div class="title">
        Periode
      </div>

      <div
        class="value"
        id="periode"
      >
        Mei 2026
      </div>

    </div>

  </div>

  <div class="card tagihan">

    <div class="title">
      Total Tagihan
    </div>

    <div class="bill-row">

      <div
        class="nominal"
        id="harga"
      >
        Rp 0
      </div>

      <div
        class="status belum"
        id="status"
      >
        BELUM BAYAR
      </div>

    </div>

    <div class="payment-info">
      Silahkan scan QRIS untuk pembayaran
    </div>

  </div>

  </div>

  <button
    class="button"
    onclick="logout()"
  >
    Logout
  </button>

</div>

<script>

const data =
  JSON.parse(
    localStorage.getItem(
      'pelanggan'
    )
  );

if(!data){

  window.location =
    'index.html';
}

document.getElementById(
  'nama'
).innerHTML =
  data.nama || '-';

document.getElementById(
  'paket'
).innerHTML =
  data.paket || '-';

document.getElementById(
  'alamat'
).innerHTML =
  data.alamat || '-';

document.getElementById(
  'harga'
).innerHTML =
  'Rp ' +
  Number(
    data.harga || 0
  ).toLocaleString('id-ID');

function logout(){

  localStorage.removeItem(
    'pelanggan'
  );

  window.location =
    'index.html';
}

</script>

</body>
</html>
