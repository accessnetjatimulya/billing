<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Konfirmasi Pembayaran</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:auto;
  padding:20px;
  min-height:100vh;
  background:
    radial-gradient(
      circle at top left,
      #173b8f 0%,
      #07152f 45%,
      #020817 100%
    );
  color:white;
  font-family:'Poppins',sans-serif;
}

.container{
  max-width:420px;
  margin:auto;
}

.card{
  background:
    linear-gradient(
      145deg,
      rgba(28,48,95,0.96),
      rgba(12,18,35,0.97)
    );
  border:1px solid rgba(255,255,255,0.08);
  border-radius:22px;
  padding:22px;
  margin-bottom:18px;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 40px rgba(0,0,0,0.35);
}

.title{
  font-size:20px;
  font-weight:700;
  text-align:center;
  margin-bottom:20px;
}

.label{
  font-size:13px;
  color:#b8c4da;
  margin-top:10px;
}

.value{
  font-size:16px;
  font-weight:600;
  color:white;
}

input[type=file]{
  width:92%;
  margin-top:10px;
  margin-bottom:10px;
  background:white;
  padding:10px;
  border-radius:10px;
  color:#000;
}

.preview{
  width:100%;
  margin-top:10px;
  border-radius:12px;
  display:none;
}

/* ===== BUTTON STYLE SAMA PELANGGAN ===== */

.button{
  width:100%;
  height:54px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#2563eb,#1d4ed8);
  color:white;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

.logout-btn{
  margin-top:12px;
  background:linear-gradient(90deg,#2563eb,#1d4ed8);
}

.file-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
}

/* native input */
.file-row input[type=file]{
  flex:1;
  background:#fff;
  padding:10px;
  border-radius:10px;

  font-size:13px;
}

/* sembunyikan teks file default (trik browser) */
.file-row input[type=file]::file-selector-button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

/* tombol hapus */
.trash-btn{
  width:44px;
  height:52px;
  border:none;
  border-radius:10px;
  background:#ffffff;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}

.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(5px);

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:9999;
}

.popup.hidden{
  display:none;
}

.popup-box{
  width:75%;
  max-width:320px;

  background:#111a2e;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;

  padding:20px;
  text-align:center;

  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.popup-title{
  font-size:16px;
  font-weight:700;
  margin-bottom:10px;
  color:#ffcc00;
}

.popup-text{
  font-size:14px;
  color:#d1d5db;
  margin-bottom:20px;
  line-height:1.5;
}

.popup-btn{
  width:100%;
  height:44px;

  border:none;
  border-radius:10px;

  background:linear-gradient(90deg,#2563eb,#1d4ed8);
  color:#fff;

  font-weight:600;
  cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

  <div class="card">

    <div class="title">
      Konfirmasi Pembayaran
    </div>

    <div class="label">ID Pelanggan</div>
    <div class="value" id="idpelanggan"></div>

    <div class="label">Nama</div>
    <div class="value" id="nama"></div>

    <div class="label">Paket</div>
    <div class="value" id="paket"></div>

    <div class="label">Total Tagihan</div>
    <div class="value" id="harga"></div>
	
	<div class="label" style="margin-top:15px;">
	  Silahkan upload hasil screenshoot anda di bawah ini
	</div>

	<div class="file-row">

	  <input
		type="file"
		id="bukti"
		accept="image/*"
		onchange="previewImage(event)"
	  >

	  <button type="button" class="trash-btn" onclick="hapusFile()">
		🗑️
	  </button>

	</div>

    <img id="preview" class="preview">

  </div>

</div>

<!-- TOMBOL DI LUAR CARD (SAMA PELANGGAN.HTML) -->
<div class="container">

  <button class="button" onclick="kirimKonfirmasi()">
    Lanjutkan Konfirmasi Pembayaran
  </button>

  <button class="button logout-btn" onclick="goBack()">
    Kembali
  </button>

</div>

<script>

const data =
  JSON.parse(localStorage.getItem('pelanggan'));

if(!data){
  window.location = 'index.html';
}

/* ===== LOAD DATA (AMAN, TIDAK DIUBAH) ===== */
document.getElementById('idpelanggan').innerHTML = data.id;
document.getElementById('nama').innerHTML = data.nama;
document.getElementById('paket').innerHTML = data.paket;
document.getElementById('harga').innerHTML =
  'Rp ' + Number(data.harga).toLocaleString('id-ID');

/* ===== PREVIEW IMAGE ===== */
function previewImage(event){

  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    const img = document.getElementById('preview');
    img.src = e.target.result;
    img.style.display = 'block';
  };

  reader.readAsDataURL(file);
}

function hapusFile(){

  const input = document.getElementById('bukti');
  const img = document.getElementById('preview');

  input.value = "";
  img.src = "";
  img.style.display = "none";
}

/* ===== KONFIRMASI ===== */
async function kirimKonfirmasi(){

  const file = document.getElementById('bukti').files[0];

  if(!file){
    showPopup('Upload screenshot pembayaran dulu');
    return;
  }

  const data = JSON.parse(localStorage.getItem('pelanggan'));

  const base64 = await toBase64(file);

  const payload = {
    action: "konfirmasiPembayaran",
    id: data.id,
    nama: data.nama,
    paket: data.paket,
    harga: data.harga,
    fileBase64: base64.split(',')[1],
    mimeType: file.type
  };

  const form = new FormData();
	form.append("action", "konfirmasiPembayaran");
	form.append("id", data.id);
	form.append("nama", data.nama);
	form.append("paket", data.paket);
	form.append("harga", data.harga);
	form.append("fileBase64", base64.split(',')[1]);
	form.append("mimeType", file.type);
	
  const res = await fetch("URL_APPS_SCRIPT", {
	  method: "POST",
	  body: form
  });
	
	if(!res.ok){
	  showPopup("Server error / gagal koneksi");
	  return;
	}

  const result = await res.json();

  if(result.status){

    sessionStorage.setItem('konfirmasi_sukses','1');
    window.location = 'success.html';

  } else {
    showPopup('Gagal kirim ke server');
  }
}

function toBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}

/* ===== BACK ===== */
function goBack(){
  if(document.referrer !== ""){
    window.history.back();
  } else {
    window.location = "pelanggan.html";
  }
}

function showPopup(message){

  document.getElementById('popup-text').innerText = message;
  document.getElementById('popup').classList.remove('hidden');

}

function closePopup(){
  document.getElementById('popup').classList.add('hidden');
}

</script>



<div id="popup" class="popup hidden">

  <div class="popup-box">

    <div class="popup-title">
      ⚠️ Peringatan
    </div>

    <div class="popup-text" id="popup-text">
      Pesan
    </div>

    <button class="popup-btn" onclick="closePopup()">
      OK
    </button>

  </div>

</div>


</body>
</html>
