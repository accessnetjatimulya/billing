<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Konfirmasi Pembayaran</title>

<style>

body{
  margin:0;
  padding:20px;
  background:#07152f;
  color:white;
  font-family:Poppins,sans-serif;
}

.container{
  max-width:420px;
  margin:auto;
}

.card{
  background:#13254d;
  padding:20px;
  border-radius:20px;
}

.title{
  font-size:22px;
  font-weight:700;
  margin-bottom:20px;
  text-align:center;
}

.info{
  margin-bottom:12px;
}

.label{
  font-size:13px;
  opacity:.7;
}

.value{
  font-size:16px;
  font-weight:600;
}

input[type=file]{
  width:100%;
  margin-top:20px;
  margin-bottom:20px;
}

.button{
  width:100%;
  height:54px;
  border:none;
  border-radius:14px;
  background:#2563eb;
  color:white;
  font-size:15px;
  font-weight:600;
}

.preview{
  width:100%;
  margin-top:15px;
  border-radius:12px;
  display:none;
}

</style>
</head>
<body>

<div class="container">

  <div class="card">

    <div class="title">
      Konfirmasi Pembayaran
    </div>

    <div class="info">
      <div class="label">ID Pelanggan</div>
      <div
        class="value"
        id="idpelanggan"
      ></div>
    </div>
    
    <div class="info">
      <div class="label">Nama</div>
      <div
        class="value"
        id="nama"
      ></div>
    </div>

    <div class="info">
      <div class="label">Paket</div>
      <div
        class="value"
        id="paket"
      ></div>
    </div>

    <div class="info">
      <div class="label">Total Tagihan</div>
      <div
        class="value"
        id="harga"
      ></div>
    </div>

    <input
      type="file"
      id="bukti"
      accept="image/*"
      onchange="previewImage(event)"
    >

    <img
      id="preview"
      class="preview"
    >

    <!-- Tombol Lanjut -->
    <button type="button" class="btn btn-success w-100 mt-3" onclick="lanjutKonfirmasi()">
      Lanjutkan Konfirmasi Pembayaran
    </button>
    
    <!-- Tombol Kembali -->
    <button type="button" class="btn btn-secondary w-100 mt-2" onclick="goBack()">
      ← Kembali
    </button>

  </div>

</div>

<script>

const data =
  JSON.parse(
    localStorage.getItem(
      'pelanggan'
    )
  );

if(!data){

  window.location =
    'index.html';
}

document.getElementById(
  'idpelanggan'
).innerHTML =
  data.id;
  
document.getElementById(
  'nama'
).innerHTML =
  data.nama;

document.getElementById(
  'paket'
).innerHTML =
  data.paket;

document.getElementById(
  'harga'
).innerHTML =
  'Rp ' +
  Number(data.harga)
    .toLocaleString('id-ID');

function previewImage(event){

  const file =
    event.target.files[0];

  if(!file) return;

  const reader =
    new FileReader();

  reader.onload =
    function(e){

      const img =
        document.getElementById(
          'preview'
        );

      img.src =
        e.target.result;

      img.style.display =
        'block';
    };

  reader.readAsDataURL(file);
}

function kirimKonfirmasi(){

  const file =
    document.getElementById(
      'bukti'
    ).files[0];

  if(!file){

    alert(
      'Upload screenshot pembayaran dulu'
    );

    return;
  }

  // nanti konek telegram di sini

  sessionStorage.setItem(
    'konfirmasi_sukses',
    '1'
  );

  window.location =
    'success.html';
}

</script>
<script>
  function goBack() {
    if (document.referrer !== "") {
      window.history.back();
    } else {
      window.location.href = "pelanggan.html";
    }
  }
</script>  
</body>
</html>
