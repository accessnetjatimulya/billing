<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Konfirmasi Selesai</title>

<style>

body{
  margin:0;
  background:#07152f;
  color:white;
  font-family:Poppins,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  text-align:center;
}

.box{
  max-width:400px;
}

.logo{
  width:200px;
  margin-bottom:20px;
}

.check{
  font-size:60px;
  color:#00e676;
  margin-bottom:20px;
}

.title{
  font-size:28px;
  font-weight:700;
  margin-bottom:15px;
}

.desc{
  line-height:1.8;
  opacity:.85;
}

</style>
</head>
<body>

<div class="box">

  <img
    src="logo.png"
    class="logo"
  >

  <div class="check">
    ✓
  </div>

  <div class="title">
    Konfirmasi Selesai
  </div>

  <div class="desc">
    Konfirmasi pembayaran Anda telah berhasil dikirim ke sistem admin ACCESSNet.
    <br><br>
    Silakan bisa tutup halaman ini sekarang.
    <br><br>
    Terima kasih sudah berlangganan di ACCESSNet
  </div>

</div>

<script>
// 1. Kunci status di sessionStorage saat pertama kali mendarat dari konfirmasi.html
// Ini mencegah user ditendang ke index.html ketika menekan tombol refresh
if (!sessionStorage.getItem('konfirmasi_sukses_terkunci')) {
  // Jika datang resmi membawa token 'konfirmasi_sukses', set kunci permanen selama tab dibuka
  if (sessionStorage.getItem('konfirmasi_sukses') == '1') {
    sessionStorage.setItem('konfirmasi_sukses_terkunci', '1');
  }
}

// 2. Validasi Keamanan: Jika tidak punya kunci akses, wajib ke index.html
if (sessionStorage.getItem('konfirmasi_sukses_terkunci') !== '1') {
  window.location.replace('index.html');
}

// 3. Matikan Fungsi Tombol Kembali (Disable Back)
history.pushState(null, null, location.href);
window.onpopstate = function(){
  history.go(1);
};

// Kunci tambahan untuk browser mobile (Chrome/Safari di HP) agar tidak bisa ditarik back
window.addEventListener('load', function() {
  setTimeout(function() {
    history.pushState(null, null, location.href);
  }, 50);
});
</script>

</body>
</html>
