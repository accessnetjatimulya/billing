<!DOCTYPE html>
<html>
<head>

  <title>Dashboard Admin</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>
<body>

<div class="container mt-4">

  <h3>
    Dashboard Admin
  </h3>

  <button
    class="btn btn-success mb-3"
    onclick="loadPelanggan()">

    Load Pelanggan

  </button>

  <table
    class="table table-bordered">

    <thead>

      <tr>
        <th>ID</th>
        <th>Nama</th>
        <th>HP</th>
        <th>Paket</th>
        <th>Status</th>
      </tr>

    </thead>

    <tbody id="tbody">

    </tbody>

  </table>

</div>

<script src="js/app.js"></script>

<script>

async function loadPelanggan(){

  const res =
    await fetch(API_URL,{

      method:'POST',

      body:JSON.stringify({
        action:'getPelanggan'
      })

    });

  const data =
    await res.json();

  let html = '';

  data.data.forEach(function(p){

    html += `
      <tr>
        <td>${p.id}</td>
        <td>${p.nama}</td>
        <td>${p.hp}</td>
        <td>${p.paket}</td>
        <td>${p.status}</td>
      </tr>
    `;

  });

  document.getElementById(
    'tbody'
  ).innerHTML = html;

}

</script>

</body>
</html>
